<header class="header">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <!-- Logo/Brand -->
      <a class="navbar-brand" href="#home">
        <span class="brand-text">Esther</span>
        <span class="brand-accent">Djedje</span>
      </a>

      <!-- Mobile Toggle Button -->
      <button 
        class="navbar-toggler" 
        type="button" 
        (click)="toggleMenu()"
        [class.active]="isMenuOpen"
      >
        <span class="toggler-icon"></span>
        <span class="toggler-icon"></span>
        <span class="toggler-icon"></span>
      </button>

      <!-- Navigation Menu -->
      <div class="navbar-collapse" [class.show]="isMenuOpen">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" 
               href="#home" 
               [class.active]="isActive('home')"
               (click)="closeMenu()">
              Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" 
               href="#about" 
               [class.active]="isActive('about')"
               (click)="closeMenu()">
              About
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" 
               href="#services" 
               [class.active]="isActive('services')"
               (click)="closeMenu()">
              Services
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" 
               href="#portfolio" 
               [class.active]="isActive('portfolio')"
               (click)="closeMenu()">
              Portfolio
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" 
               href="#resume" 
               [class.active]="isActive('resume')"
               (click)="closeMenu()">
              Resume
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" 
               href="#blog" 
               [class.active]="isActive('blog')"
               (click)="closeMenu()">
              Blog
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" 
               href="#contact" 
               [class.active]="isActive('contact')"
               (click)="closeMenu()">
              Contact
            </a>
          </li>
        </ul>

        <!-- Contact Button -->
        <a href="#contact" class="btn btn-primary ms-3" (click)="closeMenu()">
          <i class="fas fa-envelope"></i> Hire Me
        </a>
      </div>
    </div>
  </nav>
</header>
